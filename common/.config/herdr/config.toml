# https://github.com/ogulcancelik/herdr
# https://herdr.dev/docs/configuration/
# https://herdr.dev/plugins/

[theme]
name = "catppuccin"
auto_switch = true
light_name = "catppuccin-latte"
dark_name = "catppuccin"

[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"

[session]
resume_agents_on_restore = true

[experimental]
pane_history = true

[keys]
switch_tab = "alt+1..9"
switch_workspace = "alt+shift+1..9"
focus_agent = "ctrl+alt+1..9"

prefix = "ctrl+b"
previous_tab = "alt+h"
next_tab = "alt+l"
previous_workspace = "alt+j"
next_workspace = "alt+k"

close_pane = "prefix+q"
zoom = "prefix+z"

navigate_workspace_up = "k"
navigate_workspace_down = "j"

# https://github.com/paulbkim-dev/vim-herdr-navigation
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

# https://herdrplus.com/
[[keys.command]]
key = "prefix+up"
type = "plugin_action"
command = "cloudmanic.herdr-plus.projects"
description = "herdr-plus: projects"

[[keys.command]]
key = "prefix+down"
type = "plugin_action"
command = "cloudmanic.herdr-plus.quick-actions"
description = "herdr-plus: quick actions"

[[keys.command]]
key = "alt+shift+f"
type = "pane"
command = "pick-font"

[[keys.command]]
key = "alt+shift+p"
type = "pane"
command = "tmux-file-picker -g"

[[keys.command]]
key = "alt+shift+g"
type = "pane"
command = "lazygit"

[[keys.command]]
key = "alt+shift+d"
type = "pane"
command = "lazydocker"

[[keys.command]]
key = "alt+shift+j"
type = "pane"
command = "lazyjira"
