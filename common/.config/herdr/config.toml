onboarding = false
# https://github.com/ogulcancelik/herdr
# https://herdr.dev/docs/configuration/
# https://herdr.dev/plugins/

[theme]
name = "terminal"

[theme.custom]
accent = "##4EC983"

[ui.toast]
# delivery = "system"

delivery = "herdr"
[ui]
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"
accent = "green"

[session]
resume_agents_on_restore = true

[experimental]
pane_history = true

switch_ascii_input_source_in_prefix = true
[keys]
prefix = "ctrl+,"

switch_tab = "alt+1..9"
switch_workspace = "alt+shift+1..9"
focus_agent = "ctrl+alt+1..9"

copy_mode = "alt+esc"

open_notification_target = "prefix+,"

last_pane = "alt+o"

rename_tab = "alt+n"
new_tab = "alt+t"
previous_tab = "alt+h"
next_tab = "alt+l"
close_tab = "alt+q"

previous_workspace = "alt+k"
next_workspace = "alt+j"
new_workspace = "alt+shift+t"
close_workspace = "alt+shift+q"
rename_workspace = "alt+shift+n"

new_worktree = "alt+ctrl+n"
open_worktree = "alt+ctrl+o"

previous_agent = "alt+ctrl+k"
next_agent = "alt+ctrl+j"

zoom = "alt+z"

navigate_workspace_up = "k"
navigate_workspace_down = "j"

# https://github.com/paulbkim-dev/vim-herdr-navigation
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

[[keys.command]]
key = "alt+shift+f"
type = "pane"
command = "pick-font"
description = "Pick a font"

[[keys.command]]
key = "alt+shift+p"
type = "pane"
command = "herdr-file-picker -g"
description = "Pick a file"

[[keys.command]]
key = "alt+shift+g"
type = "pane"
command = "lazygit"
description = "Open LazyGit"

[[keys.command]]
key = "alt+shift+d"
type = "pane"
command = "lazydocker"
description = "Open LazyDocker"

[[keys.command]]
key = "alt+shift+j"
type = "pane"
command = "lazyjira"
description = "Open LazyJira"

# https://github.com/thanhdat77/herdr-picker-plus
[[keys.command]]
key = "alt+s"
type = "plugin_action"
command = "herdr-picker-plus.open"
description = "picker plus: open"

# https://github.com/cloudmanic/herdr-plus
# native project picker — supports split panes; picker-plus's project source does not
[[keys.command]]
key = "alt+p"
type = "plugin_action"
command = "cloudmanic.herdr-plus.projects"
description = "herdr-plus: projects"

# https://github.com/third774/herdr-last-workspace
[[keys.command]]
key = "alt+shift+o"
type = "plugin_action"
command = "third774.last-workspace.toggle"
description = "last workspace"
