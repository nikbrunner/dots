onboarding = false
# https://github.com/ogulcancelik/herdr
# https://herdr.dev/docs/configuration/
# https://herdr.dev/plugins/

[theme]
# name = "terminal"
# name = "catppuccin-latte"

[theme.custom]
accent = "#c67b36"   # accents.a10 (darkYellow)
panel_bg = "#eee4cf" # ui.bg.panel
# surface_dim draws the sidebar separator + section divider (and the
# scrollbar track) — must sit below bg but above overlay0's darkness.
surface_dim = "#d6cdb4"
surface0 = "#e4dec8"    # ui.bg.active
surface1 = "#d6cdb4"    # step below l10 (hand-derived, not in core)
# overlay0 doubles as the unfocused pane-border color (herdr has no
# dedicated border token; focused borders/popups use accent).
overlay0 = "#798940" # primaries.m30
overlay1 = "#506e2c" # primaries.m20
text = "#00280f"     # ui.fg.default
subtext0 = "#26541c" # ui.fg.subtle
red = "#ac6e59"
green = "#768c00"
yellow = "#a19021"
blue = "#5a8f65"
teal = "#459178"
mauve = "#b67c8d"    # palette.magenta
peach = "#c67b36"    # palette.darkYellow

[ui.toast]
delivery = "herdr"

[ui]
agent_panel_sort = "priority"
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = false
hide_tab_bar_when_single_tab = true

# https://herdr.dev/docs/configuration/#sidebar-row-layouts
[ui.sidebar.agents]
row_gap = 0
rows = [
  [
    "state_icon",
    "workspace",
    "agent",
  ],
  [
    { token = "terminal_title_stripped", dim = true },
  ],
]

[ui.sidebar.spaces]
row_gap = 0
rows = [
  [
    "state_icon",
    { token = "workspace", bold = true },
  ],
  [
    "branch",
    "git_status",
  ],
]


[session]
resume_agents_on_restore = true

[experimental]
pane_history = true
kitty_graphics = true

switch_ascii_input_source_in_prefix = true
[keys]
prefix = "ctrl+,"

switch_tab = "alt+1..9"
switch_workspace = "alt+shift+1..9"
focus_agent = "ctrl+alt+1..9"

copy_mode = "alt+esc"

open_notification_target = "prefix+,"

close_pane = "alt+x"
last_pane = "alt+o"

rename_tab = "alt+n"
new_tab = "alt+t"
previous_tab = "alt+h"
next_tab = "alt+l"
close_tab = "alt+q"

previous_workspace = "alt+k"
next_workspace = "alt+j"
new_workspace = "alt+shift+t"
close_workspace = "alt+shift+q"
rename_workspace = "alt+shift+n"

new_worktree = "alt+ctrl+n"
open_worktree = "alt+ctrl+o"
remove_worktree = "alt+ctrl+d"

previous_agent = "alt+ctrl+k"
next_agent = "alt+ctrl+j"

zoom = "alt+z"

navigate_workspace_up = "k"
navigate_workspace_down = "j"

# https://github.com/paulbkim-dev/vim-herdr-navigation
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

[[keys.command]]
key = "alt+shift+f"
type = "pane"
command = "pick-font"
description = "Pick a font"

[[keys.command]]
key = "alt+shift+p"
type = "pane"
command = "herdr-file-picker -g"
description = "Pick a file"

[[keys.command]]
key = "alt+shift+g"
type = "pane"
command = "lazygit"
description = "Open LazyGit"

[[keys.command]]
key = "alt+shift+d"
type = "pane"
command = "lazydocker"
description = "Open LazyDocker"

[[keys.command]]
key = "alt+shift+j"
type = "pane"
command = "lazyjira"
description = "Open LazyJira"

[[keys.command]]
key = "alt+shift+h"
type = "pane"
command = "hunk diff"
description = "Open Hunk"

[[keys.command]]
key = "ctrl+shift+t"
type = "pane"
command = "tuxedo"
description = "Open Tasks"

# https://github.com/thanhdat77/herdr-picker-plus
[[keys.command]]
key = "alt+s"
type = "plugin_action"
command = "herdr-picker-plus.open"
description = "picker plus: open"

# https://github.com/cloudmanic/herdr-plus
# native project picker — supports split panes; picker-plus's project source does not
[[keys.command]]
key = "alt+p"
type = "plugin_action"
command = "cloudmanic.herdr-plus.projects"
description = "herdr-plus: projects"

# https://github.com/third774/herdr-last-workspace
[[keys.command]]
key = "alt+shift+o"
type = "plugin_action"
command = "third774.last-workspace.toggle"
description = "last workspace"

[update]
channel = "preview"
