lua = "5.1"
uv = "prefix:0"

# ── CLI tools ──
atuin = "prefix:18"
bat = "prefix:0"
bob = "prefix:4"
delta = "prefix:0"
docker-cli = "prefix:29"
eza = "prefix:0"
fd = "prefix:10"
fzf = "prefix:0"
gh = "prefix:2"
git-lfs = "prefix:3"
gum = "prefix:0"
herdr = "prefix:0"
jq = "prefix:1"
lazygit = "prefix:0"
opencode = "prefix:1"
pandoc = "3.10"
ripgrep = "prefix:15"
tmux = "prefix:3"
tree-sitter = "0.26.8"
yazi = "prefix:26"
yq = "prefix:4"
yt-dlp = "prefix:2026"
zig = "latest"
zls = "latest"
zoxide = "prefix:0"
"github:maaslalani/slides" = "latest"
"npm:@anthropic-ai/claude-code" = { version = "prefix:2", npm_args = "--ignore-scripts=false" }
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:@readwise/cli" = "prefix:0"
"npm:@tanstack/cli" = "prefix:0"
"npm:typescript" = "prefix:6"
"pipx:eyeD3" = "prefix:0"
"pipx:gallery-dl" = "prefix:1"

# ── Formatters & linters ──
biome = "prefix:2"
golangci-lint = "prefix:2"
prettier = "prefix:3"
shfmt = "prefix:3"
shellcheck = "prefix:0"
stylua = "prefix:2"

# ── LSP servers ──
lua-language-server = "prefix:3"
marksman = "prefix:2026-02"
rust-analyzer = "prefix:2026-05"
taplo = "prefix:0"
"go:golang.org/x/tools/gopls" = "prefix:0"
"github:Feel-ix-343/markdown-oxide" = "latest"
"npm:@astrojs/language-server" = "prefix:2"
"npm:@typescript/native-preview" = "7.0.0-dev.20260707.2"
"npm:@tailwindcss/language-server" = "prefix:0"
"npm:@vtsls/language-server" = "prefix:0"
"npm:bash-language-server" = "prefix:5"
"npm:css-variables-language-server" = "prefix:2"
"npm:typescript-language-server" = "prefix:5"
"npm:vscode-langservers-extracted" = "prefix:4"
"npm:yaml-language-server" = "prefix:1"

# ── MCP servers ──
"npm:chrome-devtools-mcp" = "1.2.0"
"npm:exa-mcp-server" = "3.2.1"
tfenv = "latest"
java = "21"
lazydocker = "latest"

[env]
_.file = "~/.env"

[settings]
lockfile = true
# Supply-chain buffer: hide releases younger than 2 days from fuzzy resolution
# (`outdated`/`up`/`latest`), giving time for compromised releases to be yanked.
# Bypass per-tool with: MISE_MINIMUM_RELEASE_AGE=0 mise up <tool>
# minimum_release_age = "2d"
