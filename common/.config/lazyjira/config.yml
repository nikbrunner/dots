# https://github.com/textfuel/lazyjira/blob/main/docs/Config.md
gui:
  theme: default
  sidePanelWidth: 125
  issueListFields:
    - key
    - type
    - status
    - priority
    - summary

issueTabs:
  - name: Assigned
    jql: project = {{.ProjectKey}} AND assignee=currentUser() AND statusCategory != Done ORDER BY statusCategory DESC, priority DESC, updated DESC
  - name: All
    jql: project = {{.ProjectKey}} AND statusCategory != Done ORDER BY updated DESC
  - name: By status
    jql: project = {{.ProjectKey}} AND statusCategory != Done ORDER BY statusCategory DESC, updated DESC

customCommands:
  - key: "ctrl+y"
    name: "Copy as markdown link"
    command: "s=$(printf %s {{.Summary | shellescape}} | tr -d '[]'); printf '[%s %s](%s)' {{.Key | shellescape}} \"$s\" {{.URL | shellescape}} | (command -v pbcopy >/dev/null && pbcopy || wl-copy)"
    suspend: false
  - key: "y"
    name: "Copy key + summary"
    command: "s=$(printf %s {{.Summary | shellescape}} | tr -d '[]'); printf '%s %s' {{.Key | shellescape}} \"$s\" | (command -v pbcopy >/dev/null && pbcopy || wl-copy)"
    suspend: false
