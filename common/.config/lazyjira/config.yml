# https://github.com/textfuel/lazyjira/blob/main/docs/Config.md
gui:
  theme: default
  sidePanelWidth: 125
  statusIcons:
    Backlog: "💤"
    Open: "📬"
    In Progress: "⚡"
    Resolved: "✅"
  issueListFields:
    - key
    - type
    - status
    - priority
    - summary

issueTabs:
  - name: WEBSDK
    jql: project = WEBSDK AND assignee=currentUser() AND statusCategory != Done ORDER BY status ASC, priority ASC, updated ASC
  - name: Cloud Platform
    jql: project = CP AND assignee=currentUser() AND statusCategory != Done ORDER BY status ASC, priority ASC, updated ASC
  - name: Labels Server
    jql: project = LS AND assignee=currentUser() AND statusCategory != Done ORDER BY status ASC, priority ASC, updated ASC
  - name: All
    jql: assignee=currentUser() AND statusCategory != Done ORDER BY project ASC, status ASC, priority ASC, updated ASC

fields:
  - id: status
  - id: priority
  - id: assignee
  - id: reporter
  - id: issuetype
  - id: sprint
  - id: labels
  - id: components
  - id: duedate
    name: "Due Date"
    type: text

customCommands:
  - key: "ctrl+y"
    name: "Copy as markdown link"
    command: |
      s=$(printf %s {{.Summary | shellescape}} | tr -d '[]')
      link=$(printf '[%s %s](%s/browse/%s)' {{.Key | shellescape}} "$s" {{.JiraHost | shellescape}} {{.Key | shellescape}})
      printf '%s' "$link" | (command -v pbcopy >/dev/null && pbcopy || wl-copy)
      command -v herdr >/dev/null && herdr notification show "Copied markdown link" --body "$link" --sound done
    suspend: false
  - key: "y"
    name: "Copy key + summary"
    command: |
      s=$(printf %s {{.Summary | shellescape}} | tr -d '[]')
      out=$(printf '%s %s' {{.Key | shellescape}} "$s")
      printf '%s' "$out" | (command -v pbcopy >/dev/null && pbcopy || wl-copy)
      command -v herdr >/dev/null && herdr notification show "Copied key + summary" --body "$out" --sound done
    suspend: false
  - key: "b"
    name: "Copy as branch name"
    command: |
      key=$(printf %s {{.Key | shellescape}} | tr '[:upper:]' '[:lower:]')
      slug=$(printf %s {{.Summary | shellescape}} | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
      out=$(printf '%s-%s' "$key" "$slug" | cut -c1-50 | sed -E 's/-+$//')
      printf '%s' "$out" | (command -v pbcopy >/dev/null && pbcopy || wl-copy)
      command -v herdr >/dev/null && herdr notification show "Copied branch name" --body "$out" --sound done
    suspend: false
