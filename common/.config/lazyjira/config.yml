# https://github.com/textfuel/lazyjira/blob/main/docs/Config.md
gui:
  theme: default
  sidePanelWidth: 125
  statusIcons:
    Backlog: "💤"
    Open: "📬"
    In Progress: "⚡"
    Resolved: "✅"
  issueListFields:
    - key
    - type
    - status
    - priority
    - summary

issueTabs:
  - name: WEBSDK
    jql: project = WEBSDK AND assignee=currentUser() AND statusCategory != Done ORDER BY status ASC, priority ASC, updated ASC
  - name: Cloud Platform
    jql: project = CP AND assignee=currentUser() AND statusCategory != Done ORDER BY status ASC, priority ASC, updated ASC
  - name: Labels Server
    jql: project = LS AND assignee=currentUser() AND statusCategory != Done ORDER BY status ASC, priority ASC, updated ASC
  - name: All
    jql: assignee=currentUser() AND statusCategory != Done ORDER BY project ASC, status ASC, priority ASC, updated ASC

fields:
  - id: status
  - id: priority
  - id: assignee
  - id: reporter
  - id: issuetype
  - id: sprint
  - id: labels
  - id: components
  - id: duedate
    name: "Due Date"
    type: text

customCommands:
  - key: "ctrl+y"
    name: "Copy as markdown link"
    command: 's=$(printf %s {{.Summary | shellescape}} | tr -d ''[]''); printf ''[%s %s](%s/browse/%s)'' {{.Key | shellescape}} "$s" {{.JiraHost | shellescape}} {{.Key | shellescape}} | (command -v pbcopy >/dev/null && pbcopy || wl-copy)'
    suspend: false
  - key: "y"
    name: "Copy key + summary"
    command: 's=$(printf %s {{.Summary | shellescape}} | tr -d ''[]''); printf ''%s %s'' {{.Key | shellescape}} "$s" | (command -v pbcopy >/dev/null && pbcopy || wl-copy)'
    suspend: false
